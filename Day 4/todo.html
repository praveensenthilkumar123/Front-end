<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f7fc;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:#ffffff;
        width:350px;
        padding:25px;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        text-align:center;
    }

    h2{
        color:#4a6fa5;
        margin-bottom:20px;
    }

    input{
        width:70%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        outline:none;
    }

    button{
        padding:10px 15px;
        border:none;
        background:#4a90e2;
        color:white;
        border-radius:5px;
        cursor:pointer;
        margin-left:5px;
    }

    button:hover{
        background:#357abd;
    }

    ul{
        list-style:none;
        padding:0;
        margin-top:20px;
    }

    li{
        background:#eef5ff;
        padding:10px;
        margin-top:10px;
        border-radius:5px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .delete{
        background:#ff6b6b;
        color:white;
        border:none;
        padding:5px 10px;
        border-radius:4px;
        cursor:pointer;
    }

    .delete:hover{
        background:#e74c3c;
    }
</style>
</head>

<body>

<div class="container">
    <h2>My To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if(task === ""){
        alert("Please enter a task.");
        return;
    }

    let li = document.createElement("li");
    li.innerHTML = task;

    let delBtn = document.createElement("button");
    delBtn.innerHTML = "Delete";
    delBtn.className = "delete";

    delBtn.onclick = function(){
        li.remove();
    };

    li.appendChild(delBtn);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
