<<!DOCTYPE html>
<html>
<head>
    <title>TechLearn</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        /* Navigation Bar */
        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#2e2e2f;
            padding:15px 40px;
            color:white;
        }

        nav ul{
            display:flex;
            list-style:none;
        }

        nav ul li{
            margin-left:20px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
        }

        /* Hero Section */
        .hero{
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:300px;
            text-align:center;
        }

        .hero h1{
            font-size:40px;
            margin-bottom:10px;
        }

        .hero p{
            font-size:18px;
            color:#555;
            margin-bottom:20px;
        }

        .btn{
            background:#3a3b3c;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:5px;
        }

        /* Cards Section */
        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            padding:40px;
        }

        .card{
            background:white;
            width:220px;
            padding:20px;
            border:1px solid #ddd;
            border-radius:8px;
            text-align:center;
        }

        .card:hover{
            transform:translateY(-5px);
            transition:0.3s;
        }

        footer{
            text-align:center;
            background:#262627;
            color:white;
            padding:15px;
            margin-top:20px;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <h2>TechLearn</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Learn Web Development</h1>
        <p>Master HTML, CSS and JavaScript</p>
        <a href="#" class="btn">Get Started</a>
    </section>

    <!-- Feature Cards -->
    <section class="cards">
        <div class="card">
            <h3>HTML</h3>
            <p>Learn the structure of web pages.</p>
        </div>

        <div class="card">
            <h3>CSS</h3>
            <p>Design beautiful and responsive websites.</p>
        </div>

        <div class="card">
            <h3>JavaScript</h3>
            <p>Add interactivity to your web applications.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 TechLearn</p>
    </footer>

</body>
</html>
