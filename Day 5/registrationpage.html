<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e2dddd;
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .container {
            background-color: rgb(220, 219, 228);
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 0 10px lightgray;
        }

        h2 {
            text-align: center;
            color: rgb(200, 200, 210);
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 12px;
            border: 1px solid rgb(25, 24, 24);
            border-radius: 4px;
        }

        .gender {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: rgb(8, 159, 73);
            color: rgb(209, 209, 214);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(26, 201, 26);
        }
        
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:black"> Registration Form</h2>

    <form>
        <label>Full Name:</label>
        <input type="text" placeholder="">

        <label>Email:</label>
        <input type="email" placeholder="">

        <label>Phone Number:</label>
        <input type="tel" placeholder="">

        <label>Gender:</label><br>
        <input type="radio" name="gender" class="gender"> Male
        <input type="radio" name="gender" class="gender"> Female
        <br><br>

        <label>Department:</label>
        <select>
            <option>CSE</option>
            <option>IT</option>
            <option>ECE</option>
            <option></option>
            <option></option>
        </select>

        <label>Address:</label>
        <textarea rows="3"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
